<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up — Code Debugger & Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">

    <div class="auth-page">
        <!-- Left Panel: Branding -->
        <div class="auth-branding">
            <a href="/" class="auth-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
                <span>CodeViz</span>
            </a>
            <div class="branding-content">
                <h1 class="branding-title">Code Debugger<br>& <span class="gradient-text">Visualizer</span></h1>
                <p class="branding-tagline">Debug smarter. Learn faster.</p>
                <div class="branding-features">
                    <div class="brand-feature"><span class="brand-dot" style="background:#3fb950"></span>AI-Powered Debugging</div>
                    <div class="brand-feature"><span class="brand-dot" style="background:#58a6ff"></span>Step-by-Step Visualization</div>
                    <div class="brand-feature"><span class="brand-dot" style="background:#d2a8ff"></span>One-Click Auto Fix</div>
                </div>
            </div>
            <p class="branding-footer">Python • C • C++ • Java</p>
        </div>

        <!-- Right Panel: Form -->
        <div class="auth-form-panel">
            <div class="auth-form-card" id="auth-card">
                
                <!-- Tab Toggle -->
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="signup">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form" autocomplete="off">
                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"/></svg>
                        </div>
                        <input type="text" id="login-identifier" placeholder="Email or Username" required>
                    </div>
                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <input type="password" id="login-password" placeholder="Password" required>
                        <button type="button" class="toggle-password" data-target="login-password" title="Show password">
                            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-closed hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <div id="login-error" class="inline-error hidden"></div>
                    <button type="submit" class="auth-submit-btn" id="login-submit">
                        <span class="btn-label">Login</span>
                        <span class="btn-spinner hidden"></span>
                    </button>
                    <p class="auth-switch">Don't have an account? <a href="#" data-switch="signup">Sign up</a></p>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form hidden" autocomplete="off">
                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </div>
                        <input type="email" id="signup-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <input type="text" id="signup-username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <input type="password" id="signup-password" placeholder="Password (min. 6 characters)" required>
                        <button type="button" class="toggle-password" data-target="signup-password" title="Show password">
                            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-closed hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <div id="signup-error" class="inline-error hidden"></div>
                    <button type="submit" class="auth-submit-btn" id="signup-submit">
                        <span class="btn-label">Create Account</span>
                        <span class="btn-spinner hidden"></span>
                    </button>
                    <p class="auth-switch">Already have an account? <a href="#" data-switch="login">Login</a></p>
                </form>

                <div class="auth-divider"><span>or</span></div>
                <button class="guest-btn" id="auth-guest-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Continue as Guest
                </button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
