<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — CodeViz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">

    <div class="admin-wrapper">
        <nav class="landing-nav">
            <div class="nav-brand">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #58a6ff"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
                <span>CodeViz</span>
            </div>
            <div class="landing-nav-links">
                <a href="/app" class="nav-link">Open Debugger</a>
                <button id="admin-logout-btn" class="nav-link" style="background:none;border:none;cursor:pointer;color:#888;">Logout</button>
            </div>
        </nav>

        <div class="admin-content">
            <h1 class="admin-title">Admin Dashboard</h1>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="stat-users">—</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🐞</div>
                    <div class="stat-value" id="stat-debug">—</div>
                    <div class="stat-label">Debug Requests</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👁️</div>
                    <div class="stat-value" id="stat-visual">—</div>
                    <div class="stat-label">Visualize Requests</div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="admin-table-container">
                <h2 class="admin-section-title">Recent Activity</h2>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Action</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="activity-tbody">
                        <tr><td colspan="3" style="text-align:center;color:#666;padding:20px;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check admin role
            const meRes = await fetch('/api/me');
            const meData = await meRes.json();
            if (!meData.logged_in || meData.role !== 'admin') {
                window.location.href = '/';
                return;
            }

            // Load stats
            try {
                const res = await fetch('/api/admin/stats');
                const stats = await res.json();

                if (!res.ok) {
                    window.location.href = '/';
                    return;
                }

                document.getElementById('stat-users').textContent = stats.total_users;
                document.getElementById('stat-debug').textContent = stats.debug_requests;
                document.getElementById('stat-visual').textContent = stats.visualize_requests;

                const tbody = document.getElementById('activity-tbody');
                tbody.innerHTML = '';

                if (stats.recent_activity.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#666;padding:20px;">No activity yet</td></tr>';
                } else {
                    stats.recent_activity.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${item.username}</td>
                            <td><span class="action-pill ${item.action === 'DEBUGGER' ? 'pill-debug' : 'pill-visual'}">${item.action}</span></td>
                            <td>${new Date(item.timestamp).toLocaleString()}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch(e) {
                console.error(e);
            }

            // Logout
            document.getElementById('admin-logout-btn').addEventListener('click', async () => {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/';
            });
        });
    </script>
</body>
</html>
